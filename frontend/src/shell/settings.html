<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <!--
      tauri-surreal-kit / settings.html
      Stand-alone settings page — hosts the Settings.vue component.
      Customize title via window.__APP_CONFIG__.name.
    -->
    <title id="pageTitle">App — Settings</title>

    <link rel="stylesheet" href="../css/fonts.css">
    <link href="../css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/glass-theme.css">
    <link rel="stylesheet" href="../css/glass-animations.css">

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: var(--bg-base, #09090b); height: 100vh; overflow: hidden; }

        .settings-topbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 10001;
            height: 60px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px;
            background: var(--bg-panel, rgba(15,15,18,0.9));
            backdrop-filter: blur(var(--glass-blur, 24px));
            border-bottom: 1px solid var(--border-color, rgba(255,255,255,0.1));
        }
        .settings-topbar h1 { margin: 0; font-size: 18px; color: var(--text-main, #fff); }
        .topbar-actions      { display: flex; gap: 12px; align-items: center; }

        .btn-save {
            padding: 8px 24px; border-radius: 40px; cursor: pointer;
            background: var(--accent, #8b5cf6); color: #fff; border: none;
            font-size: 14px; font-weight: 600; transition: all 0.3s;
        }
        .btn-save:hover { background: var(--accent-hover, #7c3aed); }
        .btn-back {
            padding: 8px 16px; border-radius: 40px; cursor: pointer;
            background: transparent; color: var(--text-main, #fff);
            border: 1px solid var(--border-color, rgba(255,255,255,0.1));
            font-size: 14px; transition: all 0.3s;
        }
        .btn-back:hover { border-color: var(--accent, #8b5cf6); color: var(--accent, #8b5cf6); }

        #settingsContent {
            margin-top: 60px; height: calc(100vh - 60px);
            overflow: hidden; display: flex;
        }
        .settings-container { width: 100%; height: 100%; }

        .bg-glow { position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.15; pointer-events: none; }
        .bg-glow.top-left    { width: 400px; height: 400px; top: -100px;    left: -100px;   background: var(--accent, #8b5cf6); }
        .bg-glow.bottom-right { width: 500px; height: 500px; bottom: -150px; right: -150px;  background: #3b82f6; }
    </style>
</head>
<body>
    <div class="bg-glow top-left"></div>
    <div class="bg-glow bottom-right"></div>

    <div class="settings-topbar">
        <h1>⚙️ <span id="settingsTitle">Settings</span></h1>
        <div class="topbar-actions">
            <button class="btn-save" id="saveBtn">💾 Save</button>
            <button class="btn-back" id="backBtn">← Back</button>
        </div>
    </div>

    <div id="settingsContent"></div>

    <script>
        const cfg = window.__APP_CONFIG__ || {};
        if (cfg.name) document.title = cfg.name + ' — Settings';
        document.getElementById('backBtn').onclick = () => {
            window.location.href = cfg.backUrl || 'project_launcher.html';
        };
    </script>

    <script src="../js/libs/gsap.min.js"></script>
    <script src="../js/libs/lodash.min.js"></script>
    <script src="../js/libs/vue.global.prod.js"></script>
    <script type="module" src="../js/app/settings.ts"></script>
</body>
</html>
